<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#060c18" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Sofia's Endless Runner</title>
  <link rel="stylesheet" href="ui.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%; height: 100%;
      background: radial-gradient(120% 90% at 50% 10%, #0c1830 0%, #060c18 55%, #03060e 100%);
      overflow: hidden;
      position: fixed;
    }
    #game-container {
      width: 100%; height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas { display: block; touch-action: none; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <!-- Phaser is vendored so the game works offline and never depends on a CDN -->
  <script src="vendor/phaser.min.js"></script>
  <script src="version.js?v=bb2b996"></script>
  <script type="module" src="src/main.js?v=bb2b996"></script>
  <script>
    // Offline support on the deployed site; skipped locally so the dev
    // server never serves stale cached modules.
    if ('serviceWorker' in navigator &&
        !['localhost', '127.0.0.1'].includes(location.hostname)) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
