name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate deployed app version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILT_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          cat > version.js <<EOF
          window.APP_VERSION = {
            label: '${SHORT_SHA}',
            commit: '${GITHUB_SHA}',
            builtAt: '${BUILT_AT}',
          };
          EOF
          export SHORT_SHA
          python3 - <<'PY'
          import os
          from pathlib import Path

          short_sha = os.environ['SHORT_SHA']
          index = Path('index.html')
          html = index.read_text()
          # Cache-bust the entry points. Module imports under src/ are not
          # query-busted here; the service worker versions those by commit.
          for asset in ('version.js', 'src/main.js'):
              html = html.replace(f'src="{asset}"', f'src="{asset}?v={short_sha}"')
          index.write_text(html)

          # Version the service worker cache so each deploy invalidates the last
          sw = Path('sw.js')
          sw.write_text(sw.read_text().replace("const APP_VERSION = 'local-dev';",
                                               f"const APP_VERSION = '{short_sha}';"))
          PY

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github'
